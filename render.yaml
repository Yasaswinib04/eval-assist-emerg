services:
  - type: web
    name: evalassist
    runtime: python
    repo: https://github.com/Yasaswinib04/eval-assist-emerg
    branch: prod
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.2"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: evalassist
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: QWEN_MODEL
        value: qwen/qwen3-vl-235b-a22b-instruct
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
