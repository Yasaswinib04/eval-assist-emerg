services:
  - type: web
    name: evalassist
    runtime: python
    repo: https://github.com/Yasaswinib04/eval-assist-emerg
    branch: prod
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.2"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: evalassist
      - key: JWT_SECRET
        sync: false
