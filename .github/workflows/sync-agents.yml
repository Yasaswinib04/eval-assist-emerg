name: Sync AGENTS.md

on:
  push:
    branches:
      - prod
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 8am UTC

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run drift check
        id: drift
        run: python scripts/validate_agents.py > drift_report.md 2>&1
        continue-on-error: true

      - name: Read drift report
        id: read
        run: |
          {
            echo 'report<<EOF'
            cat drift_report.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Open issue if drift detected
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.read.outputs.report }}`;

            // Check for existing open drift issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['agents-drift'],
            });

            if (issues.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: report,
              });
              console.log(`Updated existing issue #${issues[0].number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'AGENTS.md drift detected — sync needed',
                labels: ['agents-drift'],
                body: report,
              });
              console.log('Created new issue');
            }
